<!--
  文件作用：浏览器首先加载的 HTML 外壳。
  文件交互：第 16 行提供 React 挂载节点 #root；第 17 行加载 src/main.tsx。
  交互方式：Vite 在开发和构建时处理 module 脚本，并把生成的资源注入最终 HTML。
-->
<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="一个轻量、现代、可扩展的 Web 项目起点。" />
    <meta name="theme-color" content="#f5f4ef" />
    <title>开发：从入门到入土</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
